<g class="city"><circle cx="800" cy="505" r="7" /><text x="816" y="510">Bridgetown</text></g>
<text class="map-title" x="80" y="105">Barbados Political Study Map</text>
<text class="map-subtitle" x="80" y="145">Capital: Bridgetown | Continent: North America</text>
