<path class="river" d="M 460 404 C 610 524, 670 309, 820 439 S 1040 614, 1160 514" /><text class="terrain-label" x="660" y="355">Highlands</text><text class="terrain-label" x="880" y="720">Lowlands</text>
<text class="map-title" x="80" y="105">Cape Verde Physical Study Map</text>
<text class="map-subtitle" x="80" y="145">Landmark: Pico do Fogo Volcano | Study terrain and water systems</text>
