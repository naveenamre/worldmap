<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Kiribati Physical Study Map</title>
  <desc id="desc">Generated from local app country data. Run npm run maps:build with network access for Natural Earth/Commons upgrades.</desc>
  <defs>
    <linearGradient id="terrain" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#6c8c53" />
      <stop offset="42%" stop-color="#d5c487" />
      <stop offset="72%" stop-color="#b88b5f" />
      <stop offset="100%" stop-color="#f1f5ee" />
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.16" />
    </filter>
    <style>
      .neighbor { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.2; opacity: 0.72; }
      .country { fill: url(#terrain); stroke: #1f2937; stroke-width: 4; filter: url(#softShadow); }
      .admin1 { fill: none; stroke: #64748b; stroke-width: 1.1; stroke-dasharray: 6 7; opacity: 0.75; }
      .river { fill: none; stroke: #1d9bd1; stroke-width: 3; stroke-linecap: round; opacity: 0.88; }
      .lake { fill: #8ed1ea; stroke: #0ea5e9; stroke-width: 1.5; opacity: 0.8; }
      .city circle { fill: #ef4444; stroke: #ffffff; stroke-width: 2; }
      .city text, .terrain-label { fill: #172033; font: 700 24px system-ui, sans-serif; paint-order: stroke; stroke: #ffffff; stroke-width: 5; stroke-linejoin: round; }
      .map-title { fill: #0f172a; font: 800 46px system-ui, sans-serif; }
      .map-subtitle { fill: #475569; font: 600 24px system-ui, sans-serif; }
      .footer { fill: #64748b; font: 500 18px system-ui, sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#d8edf0" />
  <rect x="40" y="40" width="1520" height="1020" rx="32" fill="#ffffff" opacity="0.54" />
  <path class="country" d="M 1268.9 565 L 1226.1 654.9 L 1156.4 726.4 L 1075.5 788.4 L 969.5 822.4 L 855.1 824.2 L 743.2 836.2 L 612.5 861.8 L 482.5 836.9 L 417.5 743.2 L 417.8 642 L 418.9 565 L 410.6 485.9 L 441.3 402.1 L 518.8 335 L 616.4 276.7 L 734.1 230.3 L 864.2 242.3 L 965.6 316 L 1039.1 383.5 L 1132.6 418.9 L 1233.4 473 Z" />
<path class="river" d="M 460 365 C 610 485, 670 270, 820 400 S 1040 575, 1160 475" /><text class="terrain-label" x="660" y="355">Highlands</text><text class="terrain-label" x="880" y="720">Lowlands</text>
<text class="map-title" x="80" y="105">Kiribati Physical Study Map</text>
<text class="map-subtitle" x="80" y="145">Landmark: Tarawa Lagoon | Study terrain and water systems</text>
  <text class="footer" x="80" y="1036">Generated from local app country data. Run npm run maps:build with network access for Natural Earth/Commons upgrades.</text>
</svg>
