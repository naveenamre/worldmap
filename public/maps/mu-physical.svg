<path class="river" d="M 460 361 C 610 481, 670 266, 820 396 S 1040 571, 1160 471" /><text class="terrain-label" x="660" y="355">Highlands</text><text class="terrain-label" x="880" y="720">Lowlands</text>
<text class="map-title" x="80" y="105">Mauritius Physical Study Map</text>
<text class="map-subtitle" x="80" y="145">Landmark: Chamarel Seven Coloured Earths | Study terrain and water systems</text>
