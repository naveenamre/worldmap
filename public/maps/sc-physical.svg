<path class="river" d="M 460 419 C 610 539, 670 324, 820 454 S 1040 629, 1160 529" /><text class="terrain-label" x="660" y="355">Highlands</text><text class="terrain-label" x="880" y="720">Lowlands</text>
<text class="map-title" x="80" y="105">Seychelles Physical Study Map</text>
<text class="map-subtitle" x="80" y="145">Landmark: Vallée de Mai | Study terrain and water systems</text>
